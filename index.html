<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحة تسجيل الدخول</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            text-align: center;
        }
        .login-container h1 {
            margin-bottom: 20px;
        }
        .login-container input[type="text"],
        .login-container input[type="password"] {
            width: 80%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        .login-container button {
            padding: 10px 20px;
            margin-top: 10px;
            border: none;
            border-radius: 5px;
            background-color: #4285f4;
            color: white;
            cursor: pointer;
        }
        .login-container img {
            max-width: 150px;
            margin: 15px 0;
        }
        .links {
            margin-top: 10px;
        }
        .links a {
            text-decoration: none;
            color: #4285f4;
            margin: 0 5px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>Welcome Back</h1>
        <!-- صورة GIF الموجودة في المستودع -->
        <img src="https://raw.githubusercontent.com/acbeleulmi-code/Logein-page/main/im.gif" alt="Gif">

        <form>
            <input type="text" placeholder="Username" required><br>
            <input type="password" placeholder="Password" required><br>
            <button type="submit">Sign In</button>
        </form>

        <div class="links">
            <input type="checkbox" id="remember"> <label for="remember">Remember me</label><br>
            <a href="#">Forget my password</a>
        </div>

        <!-- مكان لإضافة صورة Social إذا قمت برفعها لاحقًا -->
        <!-- <img src="https://raw.githubusercontent.com/acbeleulmi-code/Logein-page/main/social.png" alt="Social"> -->
    </div>
</body>
</html>
